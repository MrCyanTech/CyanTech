<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>CyanTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-auth-nav">
    <button id="login-btn" class="tech-btn nav-btn">Log In</button>
    <button id="signup-btn" class="tech-btn nav-btn">Sign Up</button>
    <button id="logout-btn" class="tech-btn nav-btn" hidden>Log Out</button>
  </div>

  <div class="container">
    <h1>CyanTech</h1>
    <p>Semiconductor & Systems Engineering Platform</p>
    <div class="button-grid">
      <button id="enter-lab-btn" class="tech-btn">Enter Lab</button>
      <button class="tech-btn">COSMOS Notes</button>
      <button class="tech-btn">Semiconductor Sim</button>
      <button class="tech-btn">Data Console</button>
    </div>
    <p id="home-status" class="auth-status">Not logged in.</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
