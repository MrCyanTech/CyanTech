<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>CyanTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-auth-nav">
    <button id="login-btn" class="tech-btn nav-btn">Log In</button>
    <button id="signup-btn" class="tech-btn nav-btn">Sign Up</button>
    <button id="logout-btn" class="tech-btn nav-btn" hidden>Log Out</button>
  </div>

  <div class="container">
    <h1>CyanTech</h1>
    <p>Semiconductor & Systems Engineering Platform</p>
    <div class="button-grid">
      <button id="enter-lab-btn" class="tech-btn">Enter Lab</button>
      <button class="tech-btn">Progress Log</button>
      <button class="tech-btn">Semiconductor Sim</button>
      <button class="tech-btn">Data Console</button>
    </div>
    <p id="home-status" class="auth-status">Not logged in.</p>
  </div>

  <div class="container secondary-container">
    <div class="button-grid single-row">
      <button class="tech-btn">Platform Info</button>
      <button class="tech-btn" onclick="window.location.href='contact.html'">Contact Us</button>
    </div>
  </div>
  <!-- AI Assistant Chat Widget -->
  <div id="ai-chat-widget" class="ai-chat-widget">
    <div id="ai-chat-container" class="ai-chat-container hidden">
      <div class="ai-chat-header">
        <span>CYAN-AI Assistant</span>
        <button id="close-chat" class="close-btn">&times;</button>
      </div>
      <div id="ai-chat-messages" class="ai-chat-messages">
        <div class="ai-message ai">Hello! I am CYAN-AI. How can I help you with the platform today?</div>
      </div>
      <div class="ai-chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Ask a question..." autocomplete="off">
        <button id="send-chat" class="send-btn">Send</button>
      </div>
    </div>
    <button id="ai-chat-toggle" class="ai-chat-toggle">
      <span class="ai-icon">AI</span>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
