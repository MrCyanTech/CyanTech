<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>Semiconductor Simulation - CyanTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>SEMICONDUCTOR SIM</h1>
    <p>Choose your simulation environment</p>
    
    <div style="display: flex; flex-direction: column; align-items: center; gap: 25px; margin-top: 40px;">
      <div style="display: flex; gap: 30px;">
        <button class="tech-btn success" style="width: 300px; height: 100px;" onclick="FlowEngine.navigate('SIM_PLACEHOLDER', { type: 'free' })">Free Simulation</button>
        <button class="tech-btn" style="width: 300px; height: 100px;" onclick="FlowEngine.navigate('SIM_PLACEHOLDER', { type: 'lab' })">Lab Simulation</button>
      </div>
      <button onclick="FlowEngine.goHome()" class="tech-btn" style="width: 300px; height: 80px; margin-top: 20px;">Back</button>
    </div>
  </div>

  <script src="flowEngine.js"></script>
  <script src="app.js"></script>
</body>
</html>
