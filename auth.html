<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>CyanTech Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <section class="auth-panel" aria-live="polite">
      <h2 id="auth-title">Account Access</h2>
      <form id="auth-form">
        <input id="username-input" type="text" placeholder="Username" autocomplete="username" required>
        <input id="password-input" type="password" placeholder="Password" autocomplete="current-password" required>
        <button id="auth-submit" class="tech-btn" type="submit">Continue</button>
      </form>
      <p id="auth-status" class="auth-status">Choose Log In or Sign Up to begin.</p>
      <div class="auth-actions">
        <button id="switch-login-btn" class="tech-btn nav-btn" type="button">Log In Mode</button>
        <button id="switch-signup-btn" class="tech-btn nav-btn" type="button">Sign Up Mode</button>
        <button id="back-home-btn" class="tech-btn nav-btn" type="button" onclick="window.location.href='index.html'">Back</button>
      </div>
    </section>
  </div>
  <script src="auth.js"></script>
</body>
</html>
