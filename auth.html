<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>CyanTech Auth</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="background-effects.css">
  <style>
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <section class="auth-panel" aria-live="polite">
      <h2 id="auth-title">Account Access</h2>
      <form id="auth-form">
        <input id="username-input" type="text" placeholder="Display Username" autocomplete="username" class="hidden">
        <input id="email-input" type="email" placeholder="Email Address" autocomplete="email" required>
        <input id="confirm-email-input" type="email" placeholder="Confirm Email Address" autocomplete="email" class="hidden">
        <input id="password-input" type="password" placeholder="Password" autocomplete="current-password" required>
        <input id="confirm-password-input" type="password" placeholder="Confirm Password" autocomplete="new-password" class="hidden">
        <button id="auth-submit" class="tech-btn" type="submit">Continue</button>
      </form>
      <p id="auth-status" class="auth-status">Choose Log In or Sign Up to begin.</p>
      <div class="auth-actions">
        <button id="switch-login-btn" class="tech-btn nav-btn" type="button">Log In Mode</button>
        <button id="switch-signup-btn" class="tech-btn nav-btn" type="button">Sign Up Mode</button>
        <button id="back-home-btn" class="tech-btn nav-btn" type="button" onclick="NavigationController.goHome()">Back</button>
      </div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="stateManager.js"></script>
  <script src="auth.js"></script>
  <script src="flowRules.js"></script>
  <script src="flowEngine.js"></script>
  <script src="navigationController.js"></script>
  <script src="background-effects.js"></script>
  <script src="authUI.js"></script>
</body>
</html>
