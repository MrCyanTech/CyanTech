<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>Introductory Lab - CyanTech</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .typewriter-container {
      margin-top: 40px;
      font-size: 22px;
      color: #38bdf8;
      min-height: 250px;
      line-height: 1.6;
      text-align: left;
      padding: 30px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      font-family: 'Orbitron', monospace;
      white-space: pre-wrap;
      overflow-y: auto;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 24px;
      background-color: #38bdf8;
      margin-left: 5px;
      animation: blink 0.7s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .action-area {
      display: flex;
      justify-content: center;
      margin-top: 40px;
      gap: 20px;
      min-height: 100px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>INTRODUCTORY LAB</h1>
    <div id="intro-text" class="typewriter-container"></div>
    
    <div class="action-area">
      <button id="next-btn" class="tech-btn hidden" style="width: 250px; height: 80px;">Next</button>
      <button id="ok-btn" class="tech-btn hidden" style="width: 250px; height: 80px;">OK</button>
      <button id="back-btn" class="tech-btn" style="width: 250px; height: 80px;" onclick="NavigationController.navigate('LAB')">Back to Menu</button>
    </div>
  </div>

  <script src="stateManager.js"></script>
  <script src="auth.js"></script>
  <script src="flowRules.js"></script>
  <script src="flowEngine.js"></script>
  <script src="navigationController.js"></script>
  <script>
    const container = document.getElementById("intro-text");
    const nextBtn = document.getElementById("next-btn");
    const okBtn = document.getElementById("ok-btn");
    const backBtn = document.getElementById("back-btn");

    const stages = [
      {
        text: ">> Initializing Semiconductor Research Environment...\n>> Connection to COSMOS-CORE established...\n>> Access Granted.\n\nWelcome, Engineer.\nYour introductory module is ready for access.",
        next: 1
      },
      {
        text: "This is the beginning of your journey towards mastering semiconductor materials and device engineering.\n\nThis Lab will present to you the basic foundational knowledge that you will apply for the rest of your journey.",
        next: 2,
        pauseAfterFirstLine: true
      },
      {
        text: "Hmm... it seems like MrCyanTech has not developed this far yet. Please check again another time!",
        final: true
      }
    ];

    let currentStage = 0;
    let charIndex = 0;
    let typing = false;

    function typeWriter(text, callback) {
      typing = true;
      if (charIndex < text.length) {
        const char = text.charAt(charIndex);
        container.innerHTML = text.substring(0, charIndex + 1) + '<span class="cursor"></span>';
        charIndex++;
        
        // Handle the specific pause requested in stage 1 (the second stage in 0-index)
        if (stages[currentStage].pauseAfterFirstLine && char === '\n' && text.substring(0, charIndex).includes("engineering.")) {
           setTimeout(() => typeWriter(text, callback), 1500); // 1.5s pause
        } else {
           setTimeout(() => typeWriter(text, callback), 40);
        }
      } else {
        container.innerHTML = text + '<span class="cursor"></span>';
        typing = false;
        charIndex = 0;
        if (callback) callback();
      }
    }

    function startStage(index) {
      currentStage = index;
      container.innerHTML = '<span class="cursor"></span>';
      nextBtn.classList.add("hidden");
      okBtn.classList.add("hidden");
      
      const stage = stages[index];
      typeWriter(stage.text, () => {
        if (stage.final) {
          okBtn.classList.remove("hidden");
        } else {
          nextBtn.classList.remove("hidden");
        }
      });
    }

    nextBtn.addEventListener("click", () => {
      if (typing) return;
      startStage(currentStage + 1);
    });

    okBtn.addEventListener("click", () => {
      NavigationController.navigate('LAB');
    });

    window.onload = () => {
      setTimeout(() => startStage(0), 500);
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
