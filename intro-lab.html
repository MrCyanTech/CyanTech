<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>Introductory Lab - CyanTech</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .typewriter-container {
      margin-top: 40px;
      font-size: 22px;
      color: #38bdf8;
      min-height: 200px;
      line-height: 1.6;
      text-align: left;
      padding: 30px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      font-family: 'Orbitron', monospace;
      white-space: pre-wrap;
      overflow: hidden;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 24px;
      background-color: #38bdf8;
      margin-left: 5px;
      animation: blink 0.7s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>INTRODUCTORY LAB</h1>
    <div id="intro-text" class="typewriter-container"></div>
    
    <div style="display: flex; justify-content: center; margin-top: 50px;">
      <button onclick="window.location.href='enter-lab.html'" class="tech-btn" style="width: 350px; height: 100px;">Back</button>
    </div>
  </div>

  <script>
    const text = ">> Initializing Semiconductor Research Environment...\n>> Connection to COSMOS-CORE established...\n>> Access Granted.\n\nWelcome, Engineer.\nYour introductory module is ready for access.";
    const container = document.getElementById("intro-text");
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        // Append character
        const char = text.charAt(i);
        container.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
        i++;
        setTimeout(typeWriter, 40);
      } else {
        // Keep cursor blinking at the end
        container.innerHTML = text + '<span class="cursor"></span>';
      }
    }

    // Start after a short delay
    window.onload = () => {
      setTimeout(typeWriter, 500);
    };
  </script>
</body>
</html>
